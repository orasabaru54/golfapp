<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ゴルフスコアカード</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a3a1a;
      color: #333;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      padding: 24px 0 16px;
    }

    header h1 {
      color: #fff;
      font-size: 2rem;
      letter-spacing: 2px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    header p {
      color: #a8d5a8;
      font-size: 0.9rem;
      margin-top: 4px;
    }

    .round-info {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }

    .round-info label {
      display: block;
      font-size: 0.75rem;
      color: #888;
      margin-bottom: 4px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .round-info input {
      width: 100%;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }

    .round-info input:focus {
      outline: none;
      border-color: #2e7d32;
    }

    .scorecard {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      margin-bottom: 20px;
    }

    .scorecard-header {
      background: #2e7d32;
      color: #fff;
      padding: 12px 20px;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 1px;
    }

    .holes-grid {
      padding: 0;
    }

    .hole-row {
      display: grid;
      grid-template-columns: 48px 70px 70px 1fr;
      align-items: stretch;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.15s;
    }

    .hole-row:last-child { border-bottom: none; }
    .hole-row:hover { background: #f8fff8; }

    .hole-row.out-row,
    .hole-row.in-row,
    .hole-row.total-row {
      background: #e8f5e9;
      font-weight: 700;
    }

    .hole-row.total-row {
      background: #2e7d32;
      color: #fff;
    }

    .cell {
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
    }

    .cell-hole {
      background: #388e3c;
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      border-right: 2px solid #2e7d32;
    }

    .cell-par {
      border-right: 1px solid #e0e0e0;
    }

    .cell-par select {
      border: 1.5px solid #ccc;
      border-radius: 6px;
      padding: 4px 6px;
      font-size: 0.9rem;
      background: #fff;
      cursor: pointer;
      width: 54px;
      text-align: center;
    }

    .cell-score {
      border-right: 1px solid #e0e0e0;
    }

    .score-input {
      width: 52px;
      border: 1.5px solid #ccc;
      border-radius: 6px;
      padding: 4px 6px;
      font-size: 1rem;
      text-align: center;
      transition: all 0.2s;
    }

    .score-input:focus {
      outline: none;
      border-color: #2e7d32;
      box-shadow: 0 0 0 3px rgba(46,125,50,0.15);
    }

    .score-eagle  { background: #ffd700; border-color: #ffc400; font-weight: 700; border-radius: 50%; }
    .score-birdie { background: #ff6b6b; color: #fff; border-color: #e53935; font-weight: 700; border-radius: 50%; }
    .score-par    { background: #fff; }
    .score-bogey  { background: #e3f2fd; border-color: #1976d2; }
    .score-double { background: #bbdefb; border-color: #0d47a1; }
    .score-triple { background: #90caf9; border-color: #0d47a1; font-weight: 700; }

    .cell-memo {
      justify-content: flex-start;
      padding: 6px 12px;
    }

    .memo-input {
      width: 100%;
      border: 1.5px solid transparent;
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 0.85rem;
      background: #f9f9f9;
      transition: all 0.2s;
      resize: none;
      min-height: 36px;
      font-family: inherit;
      line-height: 1.4;
    }

    .memo-input:focus {
      outline: none;
      border-color: #81c784;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(129,199,132,0.2);
    }

    .column-labels {
      display: grid;
      grid-template-columns: 48px 70px 70px 1fr;
      background: #f5f5f5;
      border-bottom: 2px solid #e0e0e0;
    }

    .column-label {
      padding: 8px 12px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      text-align: center;
    }

    .subtotal-cell {
      font-size: 1.1rem;
      font-weight: 700;
      color: #2e7d32;
    }

    .hole-row.total-row .subtotal-cell {
      color: #fff;
      font-size: 1.2rem;
    }

    .diff-badge {
      display: inline-block;
      font-size: 0.7rem;
      padding: 1px 5px;
      border-radius: 4px;
      margin-left: 4px;
      vertical-align: middle;
    }

    .diff-under { background: #ff6b6b; color: #fff; }
    .diff-over  { background: #1976d2; color: #fff; }
    .diff-even  { background: #4caf50; color: #fff; }

    .summary-bar {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }

    .summary-item {
      flex: 1;
      min-width: 100px;
      text-align: center;
      padding: 12px;
      border-radius: 8px;
      background: #f1f8e9;
    }

    .summary-item .val {
      font-size: 1.8rem;
      font-weight: 700;
      color: #2e7d32;
    }

    .summary-item .lbl {
      font-size: 0.72rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 28px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }

    .btn-primary {
      background: #2e7d32;
      color: #fff;
    }

    .btn-primary:hover { background: #1b5e20; transform: translateY(-1px); }

    .btn-secondary {
      background: #fff;
      color: #2e7d32;
      border: 2px solid #2e7d32;
    }

    .btn-secondary:hover { background: #f1f8e9; }

    .btn-danger {
      background: #fff;
      color: #c62828;
      border: 2px solid #c62828;
    }

    .btn-danger:hover { background: #ffebee; }

    .legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 0 0 24px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: #a8d5a8;
    }

    .legend-dot {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 2px solid transparent;
    }

    .saved-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #2e7d32;
      color: #fff;
      padding: 12px 28px;
      border-radius: 24px;
      font-weight: 600;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      transition: transform 0.3s ease;
      z-index: 100;
    }

    .saved-toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 600px) {
      .round-info { grid-template-columns: 1fr 1fr; }
      .hole-row { grid-template-columns: 40px 60px 60px 1fr; }
      .column-labels { grid-template-columns: 40px 60px 60px 1fr; }
      header h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>⛳ ゴルフスコアカード</h1>
    <p>各ホールのスコアとメモを記録できます</p>
  </header>

  <!-- ラウンド情報 -->
  <div class="round-info">
    <div>
      <label>コース名</label>
      <input type="text" id="course-name" placeholder="例: ○○ゴルフクラブ">
    </div>
    <div>
      <label>プレー日</label>
      <input type="date" id="play-date">
    </div>
    <div>
      <label>プレーヤー名</label>
      <input type="text" id="player-name" placeholder="例: 山田 太郎">
    </div>
  </div>

  <!-- スコアカード -->
  <div class="scorecard">
    <div class="scorecard-header">OUT (前半 1〜9ホール)</div>
    <div class="column-labels">
      <div class="column-label">H</div>
      <div class="column-label">Par</div>
      <div class="column-label">Score</div>
      <div class="column-label">メモ・気になること</div>
    </div>
    <div class="holes-grid" id="out-holes"></div>
  </div>

  <div class="scorecard">
    <div class="scorecard-header">IN (後半 10〜18ホール)</div>
    <div class="column-labels">
      <div class="column-label">H</div>
      <div class="column-label">Par</div>
      <div class="column-label">Score</div>
      <div class="column-label">メモ・気になること</div>
    </div>
    <div class="holes-grid" id="in-holes"></div>
  </div>

  <!-- サマリー -->
  <div class="summary-bar">
    <div class="summary-item">
      <div class="val" id="sum-out">-</div>
      <div class="lbl">OUT スコア</div>
    </div>
    <div class="summary-item">
      <div class="val" id="sum-in">-</div>
      <div class="lbl">IN スコア</div>
    </div>
    <div class="summary-item">
      <div class="val" id="sum-total">-</div>
      <div class="lbl">合計スコア</div>
    </div>
    <div class="summary-item">
      <div class="val" id="sum-par">72</div>
      <div class="lbl">合計 Par</div>
    </div>
    <div class="summary-item">
      <div class="val" id="sum-diff">-</div>
      <div class="lbl">+/- Par</div>
    </div>
    <div class="summary-item">
      <div class="val" id="sum-eagles">0</div>
      <div class="lbl">イーグル以下</div>
    </div>
    <div class="summary-item">
      <div class="val" id="sum-birdies">0</div>
      <div class="lbl">バーディー</div>
    </div>
    <div class="summary-item">
      <div class="val" id="sum-pars">0</div>
      <div class="lbl">パー</div>
    </div>
    <div class="summary-item">
      <div class="val" id="sum-bogeys">0</div>
      <div class="lbl">ボギー</div>
    </div>
    <div class="summary-item">
      <div class="val" id="sum-doubles">0</div>
      <div class="lbl">ダブル以上</div>
    </div>
  </div>

  <!-- ボタン -->
  <div class="actions">
    <button class="btn btn-primary" onclick="saveData()">💾 保存する</button>
    <button class="btn btn-secondary" onclick="loadData()">📂 読み込む</button>
    <button class="btn btn-secondary" onclick="printCard()">🖨️ 印刷する</button>
    <button class="btn btn-danger" onclick="resetAll()">🗑️ リセット</button>
  </div>

  <!-- 凡例 -->
  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:#ffd700;border-color:#ffc400"></div> イーグル以下
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#ff6b6b;border-color:#e53935"></div> バーディー
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#fff;border-color:#ccc"></div> パー
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#e3f2fd;border-color:#1976d2"></div> ボギー
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#bbdefb;border-color:#0d47a1"></div> ダブルボギー
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#90caf9;border-color:#0d47a1"></div> トリプル以上
    </div>
  </div>
</div>

<div class="saved-toast" id="toast">保存しました！</div>

<script>
const DEFAULT_PARS = [4,4,3,4,5,3,4,5,4, 4,3,4,5,4,3,5,4,4];

function buildHoles() {
  const outEl = document.getElementById('out-holes');
  const inEl  = document.getElementById('in-holes');

  for (let i = 1; i <= 18; i++) {
    const container = i <= 9 ? outEl : inEl;
    const row = document.createElement('div');
    row.className = 'hole-row';
    row.id = `hole-row-${i}`;

    const par = DEFAULT_PARS[i - 1];

    row.innerHTML = `
      <div class="cell cell-hole">${i}</div>
      <div class="cell cell-par">
        <select id="par-${i}" onchange="recalc()">
          <option value="3" ${par===3?'selected':''}>3</option>
          <option value="4" ${par===4?'selected':''}>4</option>
          <option value="5" ${par===5?'selected':''}>5</option>
        </select>
      </div>
      <div class="cell cell-score">
        <input type="number" class="score-input" id="score-${i}"
          min="1" max="15" placeholder="-"
          oninput="onScoreChange(${i})" onchange="onScoreChange(${i})">
      </div>
      <div class="cell cell-memo">
        <textarea class="memo-input" id="memo-${i}"
          placeholder="気になること、ショットメモなど..."
          rows="1"
          oninput="autoResize(this)"></textarea>
      </div>
    `;
    container.appendChild(row);
  }

  addSubtotalRow(outEl, 'out');
  addSubtotalRow(inEl, 'in');
}

function addSubtotalRow(container, half) {
  const row = document.createElement('div');
  row.className = `hole-row ${half}-row`;
  row.innerHTML = `
    <div class="cell cell-hole" style="background:#1b5e20;font-size:0.7rem;letter-spacing:0">${half.toUpperCase()}</div>
    <div class="cell" style="font-size:0.85rem;color:#555;" id="${half}-par-sum">-</div>
    <div class="cell subtotal-cell" id="${half}-score-sum">-</div>
    <div class="cell" style="font-size:0.85rem;color:#555;" id="${half}-diff">-</div>
  `;
  container.appendChild(row);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.max(36, el.scrollHeight) + 'px';
}

function getVal(id) {
  const el = document.getElementById(id);
  return el ? (parseInt(el.value) || 0) : 0;
}

function onScoreChange(hole) {
  const score = getVal(`score-${hole}`);
  const par   = getVal(`par-${hole}`);
  const el = document.getElementById(`score-${hole}`);
  el.className = 'score-input';
  if (score > 0 && par > 0) {
    const diff = score - par;
    if (diff <= -2)      el.classList.add('score-eagle');
    else if (diff === -1) el.classList.add('score-birdie');
    else if (diff === 0)  el.classList.add('score-par');
    else if (diff === 1)  el.classList.add('score-bogey');
    else if (diff === 2)  el.classList.add('score-double');
    else                  el.classList.add('score-triple');
  }
  recalc();
}

function recalc() {
  let outScore = 0, inScore = 0, outPar = 0, inPar = 0;
  let eagles = 0, birdies = 0, pars = 0, bogeys = 0, doubles = 0;

  for (let i = 1; i <= 18; i++) {
    const score = getVal(`score-${i}`);
    const par   = parseInt(document.getElementById(`par-${i}`).value);
    const isOut = i <= 9;

    if (isOut) outPar += par; else inPar += par;
    if (score > 0) {
      if (isOut) outScore += score; else inScore += score;
      const diff = score - par;
      if (diff <= -2)      eagles++;
      else if (diff === -1) birdies++;
      else if (diff === 0)  pars++;
      else if (diff === 1)  bogeys++;
      else                  doubles++;
    }
  }

  const totalPar   = outPar + inPar;
  const totalScore = outScore + inScore;
  const outDiff    = outScore - outPar;
  const inDiff     = inScore  - inPar;
  const totalDiff  = totalScore - totalPar;

  setText('out-par-sum',   outPar + '打');
  setText('in-par-sum',    inPar  + '打');
  setText('out-score-sum', outScore  || '-');
  setText('in-score-sum',  inScore   || '-');
  setDiff('out-diff',  outScore  ? outDiff  : null);
  setDiff('in-diff',   inScore   ? inDiff   : null);

  setText('sum-out',   outScore  || '-');
  setText('sum-in',    inScore   || '-');
  setText('sum-total', totalScore || '-');
  setText('sum-par',   totalPar);
  setDiff('sum-diff',  totalScore ? totalDiff : null, true);
  setText('sum-eagles',  eagles);
  setText('sum-birdies', birdies);
  setText('sum-pars',    pars);
  setText('sum-bogeys',  bogeys);
  setText('sum-doubles', doubles);
}

function setText(id, val) {
  const el = document.getElementById(id);
  if (el) el.textContent = val;
}

function setDiff(id, val, large = false) {
  const el = document.getElementById(id);
  if (!el) return;
  if (val === null) { el.textContent = '-'; el.style.color = ''; return; }
  const sign = val > 0 ? '+' : '';
  el.textContent = sign + val;
  if (large) {
    el.style.color = val < 0 ? '#e53935' : val > 0 ? '#1976d2' : '#2e7d32';
  } else {
    el.style.color = val < 0 ? '#e53935' : val > 0 ? '#1976d2' : '#2e7d32';
  }
}

function saveData() {
  const data = {
    course: document.getElementById('course-name').value,
    date:   document.getElementById('play-date').value,
    player: document.getElementById('player-name').value,
    holes: []
  };
  for (let i = 1; i <= 18; i++) {
    data.holes.push({
      par:   document.getElementById(`par-${i}`).value,
      score: document.getElementById(`score-${i}`).value,
      memo:  document.getElementById(`memo-${i}`).value
    });
  }
  localStorage.setItem('golf_scorecard', JSON.stringify(data));
  showToast('保存しました！');
}

function loadData() {
  const raw = localStorage.getItem('golf_scorecard');
  if (!raw) { showToast('保存データがありません'); return; }
  const data = JSON.parse(raw);
  document.getElementById('course-name').value = data.course || '';
  document.getElementById('play-date').value   = data.date   || '';
  document.getElementById('player-name').value = data.player || '';
  data.holes.forEach((h, idx) => {
    const i = idx + 1;
    document.getElementById(`par-${i}`).value   = h.par;
    document.getElementById(`score-${i}`).value = h.score;
    document.getElementById(`memo-${i}`).value  = h.memo;
    const memo = document.getElementById(`memo-${i}`);
    autoResize(memo);
    onScoreChange(i);
  });
  recalc();
  showToast('読み込みました！');
}

function resetAll() {
  if (!confirm('すべてのデータをリセットしますか？')) return;
  document.getElementById('course-name').value = '';
  document.getElementById('play-date').value   = '';
  document.getElementById('player-name').value = '';
  for (let i = 1; i <= 18; i++) {
    document.getElementById(`par-${i}`).value   = DEFAULT_PARS[i-1];
    document.getElementById(`score-${i}`).value = '';
    document.getElementById(`score-${i}`).className = 'score-input';
    document.getElementById(`memo-${i}`).value  = '';
    const memo = document.getElementById(`memo-${i}`);
    memo.style.height = '36px';
  }
  recalc();
}

function printCard() {
  window.print();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// 初期化
buildHoles();
recalc();

// 今日の日付をデフォルト設定
document.getElementById('play-date').value = new Date().toISOString().split('T')[0];

// ページ離脱時に自動保存
window.addEventListener('beforeunload', saveData);
</script>
</body>
</html>
